<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Financial Planner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Finance Planner</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex align-items-center" id="nav-list">
            <li class="nav-item">
              <a class="nav-link px-3" href="index.html">Home</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3" href="goals.html">Goals</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3" href="recommendations.html">Recommendations</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3" href="market-insights.html">Market Insights</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3 active" href="calculator.html">Calculator</a>
            </li>
            <li class="nav-item guest-only">
              <a class="nav-link px-3" href="register.html">Register</a>
            </li>
            <li class="nav-item guest-only">
              <a class="nav-link px-3 active" href="login.html">Login</a>
            </li>
            <li class="nav-item auth-only ms-lg-2" style="display: none;">
              <a class="nav-link px-2" href="profile.html" title="Profile">
                <i class="bi bi-person-circle fs-4 text-white"></i>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card p-4 shadow-sm border-0">
            <h2 class="mb-4 text-center">Login</h2>
            <form id="loginForm">
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <input type="password" id="password" class="form-control" placeholder="Enter your password" required />
                  <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                    <i class="bi bi-eye-slash" id="toggleIcon"></i>
                  </button>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
            </form>
            <div id="message" class="mt-3"></div>
            <div class="text-center mt-3">
              <small class="text-muted">Don't have an account? <a href="register.html">Register here</a></small>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-client.js"></script>
    <script>
      function checkAuthState() {
        const token = localStorage.getItem('token');
        const authOnlyElements = document.querySelectorAll('.auth-only');
        const guestOnlyElements = document.querySelectorAll('.guest-only');
        if (token) {
          authOnlyElements.forEach(el => el.style.display = 'block');
          guestOnlyElements.forEach(el => el.style.display = 'none');
        } else {
          authOnlyElements.forEach(el => el.style.display = 'none');
          guestOnlyElements.forEach(el => el.style.display = 'block');
        }
      }
      document.addEventListener('DOMContentLoaded', checkAuthState);
      document.querySelector("#togglePassword").addEventListener("click", function () {
        const passwordInput = document.querySelector("#password");
        const toggleIcon = document.querySelector("#toggleIcon");
        if (passwordInput.getAttribute("type") === "password") {
          passwordInput.setAttribute("type", "text");
          toggleIcon.classList.remove("bi-eye-slash");
          toggleIcon.classList.add("bi-eye");
        } else {
          passwordInput.setAttribute("type", "password");
          toggleIcon.classList.remove("bi-eye");
          toggleIcon.classList.add("bi-eye-slash");
        }
      });
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const messageDiv = document.getElementById("message");
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const data = {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        };
        try {
          submitBtn.disabled = true;
          messageDiv.innerHTML = '<div class="alert alert-info">Authenticating...</div>';
          const response = await fetch("http://localhost:3000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          const result = await response.json();
          if (response.ok) {
            localStorage.setItem("token", result.access_token);
            messageDiv.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
            setTimeout(() => (window.location.href = "index.html"), 1500);
          } else {
            messageDiv.innerHTML = '<div class="alert alert-danger">' + (result.error || "Invalid email or password.") + '</div>';
            submitBtn.disabled = false;
          }
        } catch (error) {
          messageDiv.innerHTML = '<div class="alert alert-info text-danger">Cannot connect to server. Ensure backend is running.</div>';
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
