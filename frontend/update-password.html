      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html">Register</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
            <li class="nav-item">

        </div>
      </div>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <h1 class="mb-4">Update Password</h1>
          <div class="card p-4">
            <form id="passwordForm">
              <div class="mb-3">
                <label for="currentPassword" class="form-label">Current Password</label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="currentPassword"
                    placeholder="Enter current password"
                    required
                  />
                  <button class="btn btn-outline-secondary toggle-pwd-1" type="button">
                    <i class="bi bi-eye-slash"></i>
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label for="newPassword" class="form-label">New Password</label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    placeholder="Enter new password (min. 8 characters)"
                    required
                  />
                  <button class="btn btn-outline-secondary toggle-pwd-2" type="button">
                    <i class="bi bi-eye-slash"></i>
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    placeholder="Confirm new password"
                    required
                  />
                  <button class="btn btn-outline-secondary toggle-pwd-3" type="button">
                    <i class="bi bi-eye-slash"></i>
                  </button>
                </div>
              </div>

              <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" id="submitBtn">Update Password</button>
                <a href="profile.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api-client.js"></script>
    <script>
      function checkAuthState() {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.href = 'login.html';
        }
      }

      // Toggle password visibility
      document.querySelectorAll('.toggle-pwd-1, .toggle-pwd-2, .toggle-pwd-3').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const inputId = {
            'toggle-pwd-1': 'currentPassword',
            'toggle-pwd-2': 'newPassword',
            'toggle-pwd-3': 'confirmPassword',
          }[btn.className.split(' ')[1]];

          const input = document.getElementById(inputId);
          const icon = btn.querySelector('i');

          if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
          } else {
            input.type = 'password';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
          }
        });
      });

      // Handle password form submission
      document.getElementById('passwordForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorAlert = document.getElementById('errorAlert');
        const submitBtn = document.getElementById('submitBtn');

        // Validation
        if (newPassword.length < 8) {
          errorAlert.textContent = 'New password must be at least 8 characters long.';
          errorAlert.style.display = 'block';
          return;
        }

        if (newPassword !== confirmPassword) {
          errorAlert.textContent = 'Passwords do not match.';
          errorAlert.style.display = 'block';
          return;
        }

        if (currentPassword === newPassword) {
          errorAlert.textContent = 'New password must be different from current password.';
          errorAlert.style.display = 'block';
          return;
        }

        try {
          submitBtn.disabled = true;
          submitBtn.textContent = 'Updating...';
          errorAlert.style.display = 'none';

          await apiClient.updatePassword(currentPassword, newPassword);

          showSuccess('Password updated successfully!');
          setTimeout(() => {
            window.location.href = 'profile.html';
          }, 1500);
        } catch (error) {
          errorAlert.textContent = 'Error: ' + error.message;
          errorAlert.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
        }
      });

      document.addEventListener('DOMContentLoaded', checkAuthState);
    </script>
</html>
