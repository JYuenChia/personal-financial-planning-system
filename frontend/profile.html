<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Financial Planner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Finance Planner</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex align-items-center" id="nav-list">
            <li class="nav-item">
              <a class="nav-link px-3" href="index.html">Home</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3" href="goals.html">Goals</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3" href="recommendations.html">Recommendations</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3" href="market-insights.html">Market Insights</a>
            </li>
            <li class="nav-item auth-only" style="display: none;">
              <a class="nav-link px-3" href="calculator.html">Calculator</a>
            </li>
            <li class="nav-item guest-only">
              <a class="nav-link px-3" href="register.html">Register</a>
            </li>
            <li class="nav-item guest-only">
              <a class="nav-link px-3" href="login.html">Login</a>
            </li>
            <li class="nav-item auth-only ms-lg-2" style="display: none;">
              <a class="nav-link px-2 active" href="profile.html" title="Profile">
                <i class="bi bi-person-circle fs-4 text-white"></i>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h1 class="mb-4">Profile Management</h1>
      <div class="card p-4 mb-4">
        <h2 class="h5">View and Update Details</h2>
        <p class="text-muted">
          This page is reserved for viewing and updating user profile details.
        </p>
        <div class="placeholder-glow">
          <div class="placeholder col-12 mb-3"></div>
        </div>
      </div>
      <div class="d-flex gap-3">
        <a href="update-password.html" class="btn btn-outline-primary"
          >Update Password</a
        >
        <a href="delete-account.html" class="btn btn-outline-danger"
          >Delete Account</a
        >
        <button id="logout-btn" class="btn btn-danger ms-auto">Logout</button>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Function to handle Navbar state
      function checkAuthState() {
        const token = localStorage.getItem('token');
        const authOnlyElements = document.querySelectorAll('.auth-only');
        const guestOnlyElements = document.querySelectorAll('.guest-only');

        if (token) {
          authOnlyElements.forEach(el => el.style.display = 'block');
          guestOnlyElements.forEach(el => el.style.display = 'none');
        } else {
          authOnlyElements.forEach(el => el.style.display = 'none');
          guestOnlyElements.forEach(el => el.style.display = 'block');
          window.location.href = 'login.html';
        }
      }

      // Logout function
      document.getElementById('logout-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('token');
        window.location.href = 'index.html';
      });

      // Initialize
      document.addEventListener('DOMContentLoaded', checkAuthState);
    </script>
  </body>
</html>
