    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Function to handle Navbar state
      function checkAuthState() {
        const token = localStorage.getItem('token');
        const authOnlyElements = document.querySelectorAll('.auth-only');
        const guestOnlyElements = document.querySelectorAll('.guest-only');

        if (token) {
          authOnlyElements.forEach(el => el.style.display = 'block');
          guestOnlyElements.forEach(el => el.style.display = 'none');
        } else {
          authOnlyElements.forEach(el => el.style.display = 'none');
          guestOnlyElements.forEach(el => el.style.display = 'block');
          window.location.href = 'login.html';
        }
      }

      document.addEventListener('DOMContentLoaded', checkAuthState);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
      // 1. Initialize the Chart using your team's Primary Blue
      function initChart() {
          const ctx = document.getElementById('marketChart');
          if (!ctx) return;
          
          // Get the color from your team's CSS variable
          const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--palette-primary').trim();

          new Chart(ctx, {
              type: 'line',
              data: {
                  labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                  datasets: [{
                      label: 'Market Performance',
                      data: [4200, 4250, 4100, 4350, 4400, 4380, 4500],
                      borderColor: primaryColor,
                      backgroundColor: primaryColor + '33', // Adding transparency (33 is hex for 20%)
                      fill: true,
                      tension: 0.4,
                      pointRadius: 4
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                  scales: {
                      y: { grid: { display: false } },
                      x: { grid: { display: false } }
                  }
              }
          });
      }

      // 2. Load the News Feed
      function loadNews() {
          const newsContainer = document.getElementById('news-feed');
          const mockNews = [
              { title: "Market Rallies as Inflation Cools", time: "1h ago" },
              { title: "Tech Giants Announce Q1 Earnings", time: "3h ago" },
              { title: "New Investment Strategies for 2025", time: "5h ago" },
              { title: "Cryptocurrency Regulations Update", time: "1d ago" }
          ];

          newsContainer.innerHTML = mockNews.map(item => `
              <a href="#" class="list-group-item list-group-item-action border-0 py-3">
                  <h6 class="mb-1 fw-bold" style="color: var(--palette-text);">${item.title}</h6>
                  <small class="text-accent">${item.time}</small>
              </a>
          `).join('');
      }

      // 3. Keep your teammate's Auth check and add your functions
      document.addEventListener('DOMContentLoaded', () => {
          // Run the teammate's auth function first
          if (typeof checkAuthState === "function") {
              checkAuthState();
          }
          
          // Run your module functions
          initChart();
          loadNews();
      });
  </script>
