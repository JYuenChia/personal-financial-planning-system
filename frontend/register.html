<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Financial Planner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Finance Planner</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card p-4 shadow-sm border-0">
            <h2 class="mb-4">Create Account</h2>
            <form id="registerForm">
              <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <input
                  type="text"
                  id="full_name"
                  class="form-control"
                  placeholder="John Doe"
                />
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="name@example.com"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Min. 8 characters"
                    required
                  />
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="togglePassword"
                  >
                    <i class="bi bi-eye-slash" id="toggleIcon"></i>
                  </button>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2">
                Register
              </button>
            </form>
            <div id="message" class="mt-3"></div>
            <div class="text-center mt-3">
              <small class="text-muted"
                >Already have an account? <a href="login.html">Login here</a></small
              >
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Toggle Password Visibility
      document.querySelector("#togglePassword").addEventListener("click", function () {
        const passwordInput = document.querySelector("#password");
        const toggleIcon = document.querySelector("#toggleIcon");
        
        // Toggle the type attribute
        if (passwordInput.getAttribute("type") === "password") {
          // Make it visible
          passwordInput.setAttribute("type", "text");
          toggleIcon.classList.remove("bi-eye-slash");
          toggleIcon.classList.add("bi-eye");
        } else {
          // Hide it
          passwordInput.setAttribute("type", "password");
          toggleIcon.classList.remove("bi-eye");
          toggleIcon.classList.add("bi-eye-slash");
        }
      });

      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const messageDiv = document.getElementById("message");
          const submitBtn = e.target.querySelector('button[type="submit"]');

          // Collect data matching backend schema
          const data = {
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
            full_name: document.getElementById("full_name").value.trim() || undefined,
          };

          // Basic validation (8 character min for password as per backend)
          if (data.password.length < 8) {
            messageDiv.innerHTML = '<div class="alert alert-danger">Password must be at least 8 characters.</div>';
            return;
          }

          try {
            submitBtn.disabled = true;
            messageDiv.innerHTML = '<div class="alert alert-info">Creating account...</div>';

            const response = await fetch("http://localhost:3000/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });

            const result = await response.json();

            if (response.ok) {
              // Store token so the user is logged in immediately
              if (result.access_token) {
                localStorage.setItem("token", result.access_token);
              }
              messageDiv.innerHTML = '<div class="alert alert-success">Registration successful! Redirecting home...</div>';
              setTimeout(() => (window.location.href = "index.html"), 2000);
            } else {
              messageDiv.innerHTML = `<div class="alert alert-danger">${result.error || "Registration failed. Please try again."}</div>`;
              submitBtn.disabled = false;
            }
          } catch (error) {
            messageDiv.innerHTML = '<div class="alert alert-danger">Cannot connect to server. Ensure backend is running.</div>';
            submitBtn.disabled = false;
          }
        });
    </script>
  </body>
</html>
